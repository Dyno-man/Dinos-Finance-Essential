services:
  api:
    build:
      context: ./informationHandler
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - OCR_SERVICE_URL=http://ocr:80
      - RECEIPT_STORAGE_PATH=/data/receipt_uploads
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-10}
    ports:
      - "8000:80"
    volumes:
      - receipt-uploads:/data/receipt_uploads
    depends_on:
      - db
      - ocr
    restart: unless-stopped

  ocr:
    build:
      context: ./imageContainer
    environment:
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-10}
      - OCR_TEMP_UPLOAD_DIR=/tmp/receipt-ocr
    restart: unless-stopped

  db:
    image: postgres
    restart: unless-stopped
    shm_size: 128mb
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
  receipt-uploads:
